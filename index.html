<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="CostoRD - Ver salarios promedio por profesión en República Dominicana. Filtra por empresa, provincia y cargo.">
    <meta name="theme-color" content="#0066cc">
    <title>CostoRD - Salarios en República Dominicana</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 600px;
            width: 100%;
            padding: 40px;
            text-align: center;
        }
        
        h1 {
            color: #333;
            margin-bottom: 15px;
            font-size: 2.5em;
        }
        
        .logo {
            font-size: 3em;
            margin-bottom: 20px;
        }
        
        p {
            color: #666;
            font-size: 1.1em;
            margin-bottom: 15px;
            line-height: 1.6;
        }
        
        .features {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin: 30px 0;
            text-align: left;
        }
        
        .feature {
            background: #f5f5f5;
            padding: 15px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .feature-icon {
            font-size: 1.5em;
        }
        
        .feature-text {
            color: #555;
            font-size: 0.95em;
        }
        
        .btn {
            display: inline-block;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 14px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-size: 1.1em;
            font-weight: 600;
            transition: transform 0.3s, box-shadow 0.3s;
            margin-top: 20px;
            border: none;
            cursor: pointer;
        }
        
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(102, 126, 234, 0.4);
        }
        
        .btn:active {
            transform: translateY(0);
        }
        
        footer {
            margin-top: 30px;
            padding-top: 20px;
            border-top: 1px solid #eee;
            color: #999;
            font-size: 0.9em;
        }
        
        @media (max-width: 600px) {
            .container {
                padding: 25px;
            }
            
            h1 {
                font-size: 2em;
            }
            
            .features {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">💰</div>
        <h1>CostoRD</h1>
        <p>Descubre los salarios promedio por profesión en República Dominicana</p>
        
        <div class="features">
            <div class="feature">
                <span class="feature-icon">🏢</span>
                <span class="feature-text">Filtra por empresa</span>
            </div>
            <div class="feature">
                <span class="feature-icon">📍</span>
                <span class="feature-text">Busca por provincia</span>
            </div>
            <div class="feature">
                <span class="feature-icon">👔</span>
                <span class="feature-text">Explora por cargo</span>
            </div>
            <div class="feature">
                <span class="feature-icon">🔒</span>
                <span class="feature-text">Publica anónimamente</span>
            </div>
            <div class="feature">
                <span class="feature-icon">⭐</span>
                <span class="feature-text">Ve beneficios</span>
            </div>
            <div class="feature">
                <span class="feature-icon">📚</span>
                <span class="feature-text">Experiencia requerida</span>
            </div>
        </div>
        
        <button class="btn" onclick="window.location.href='./CostoRD.html'">
            Ir a la aplicación →
        </button>
        
        <footer>
            <p>CostoRD © 2026 | República Dominicana</p>
        </footer>
    </div>
</body>
</html>
